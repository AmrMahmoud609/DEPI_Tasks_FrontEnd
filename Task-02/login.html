<!DOCTYPE html>
<html>
<head><title>Log In</title></head>
<body bgcolor="#f0a0a0">

<br><br>
<fieldset style="width:500px; margin:auto;">
  <legend><font color="red" size="5"><i>Log In</i></font></legend>
  <br>
  User Name: <input type="text" name="username" placeholder="Enter your User name here!"> <br><br>
  PassWord: &nbsp;&nbsp;<input type="password" name="password"> <br><br>
  Select Your Location:
  <select name="location">
    <option>Egypt</option>
    <optgroup label="Africa">
      <option>Egypt</option>
      <option>Sudan</option>
      <option>Namibia</option>
    </optgroup>
    <optgroup label="Europe">
      <option>France</option>
      <option>Russia</option>
      <option>UK</option>
    </optgroup>
    <optgroup label="North America">
      <option>Canada</option>
      <option>Mexico</option>
      <option>USA</option>
    </optgroup>
  </select>
  <br><br>
  <input type="checkbox" name="remember"> Remember<u>M</u>e
  <br><br>
  <input type="submit" value="Log In">
  <br><br>
</fieldset>

</body>
</html>
